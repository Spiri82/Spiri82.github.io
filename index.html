<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open brief / Lettre ouverte</title>
  <meta name="description" content="Binnenkort verschijnen hier een open brief en een opinietekst over het Belgische begrotingsproces.">
  <meta name="robots" content="index,follow">

  <style>
    :root{
      --bg:#f3f0eb;
      --paper:#fbfaf7;
      --text:#1f1f1c;
      --muted:#625e57;
      --line:#ddd7ce;
      --measure:34rem;
      --radius:8px;
    }

    *{
      box-sizing:border-box;
    }

    html{
      font-size:18px;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
      line-height:1.5;
    }

    .page{
      min-height:100vh;
      padding:40px 20px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .panel{
      width:100%;
      max-width:calc(var(--measure) + 64px);
      background:var(--paper);
      border:1px solid rgba(0,0,0,.04);
      border-radius:var(--radius);
      padding:34px 28px;
    }

    .inner{
      max-width:var(--measure);
      margin:0 auto;
    }

    .lang-block + .lang-block{
      margin-top:26px;
      padding-top:26px;
      border-top:1px solid var(--line);
    }

    p{
      margin:0;
    }

    .lead{
      font-size:1rem;
      line-height:1.45;
    }

    .date{
      margin-top:14px;
      font-size:.96rem;
      font-weight:600;
      color:var(--text);
      line-height:1.4;
    }

    .contact{
      margin-top:14px;
      font-size:.96rem;
      color:var(--muted);
      line-height:1.4;
    }

    a{
      color:inherit;
      text-decoration-thickness:.06em;
      text-underline-offset:.14em;
    }

    a:hover,
    a:focus-visible{
      text-decoration-thickness:.1em;
    }

    @media (max-width:640px){
      html{
        font-size:17px;
      }

      .page{
        padding:20px 14px;
        align-items:flex-start;
      }

      .panel{
        padding:24px 20px;
      }

      .lang-block + .lang-block{
        margin-top:22px;
        padding-top:22px;
      }

      .date,
      .contact{
        margin-top:12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-label="Aankondiging website">
      <div class="inner">

        <section class="lang-block" lang="nl" aria-label="Nederlands">
          <p class="lead">Open brief over het Belgische begrotingsproces</p>
          <p class="date">Online vanaf 27 maart 2026, 06:00 CET</p>
          <p class="contact">
            Perscontact:
            <a href="https://www.eur.nl/en/people/kevin-spiritus">Kevin Spiritus</a>
          </p>
        </section>

        <section class="lang-block" lang="fr" aria-label="Français">
          <p class="lead">Lettre ouverte sur le processus budgétaire belge</p>
          <p class="date">En ligne à partir du 27 mars 2026, à 06:00 CET</p>
          <p class="contact">
            Contact presse :
            <a href="https://www.eur.nl/en/people/kevin-spiritus">Kevin Spiritus</a>
          </p>
        </section>

      </div>
    </section>
  </main>
</body>
</html>
